name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (for example: v0.1.1)'
        required: true
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Validate manual tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          if git rev-parse "${{ github.event.inputs.tag }}" >/dev/null 2>&1; then
            echo "Tag already exists: ${{ github.event.inputs.tag }}"
            exit 1
          fi

          case "${{ github.event.inputs.tag }}" in
            v*) ;;
            *)
              echo "Tag must start with v"
              exit 1
              ;;
          esac

      - name: Create local tag for manual release
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag "${{ github.event.inputs.tag }}"
          echo "GORELEASER_CURRENT_TAG=${{ github.event.inputs.tag }}" >> "$GITHUB_ENV"
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
